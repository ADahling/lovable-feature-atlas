name: Visual Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  feature-visual-regression:
    name: Local UI pixel diff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Test the checked-out commit. Production publication is verified as a
      # separate post-deploy check, not by mixing tests with an older live build.
      SITE_ORIGIN: http://127.0.0.1:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build application
        run: bun run build

      - name: Start local application
        run: |
          bun run dev --host 127.0.0.1 --port 8080 > /tmp/atlas-vite.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/atlas-vite.log
          exit 1

      - name: Run feature visual regression
        id: feature-vr
        # Uses a representative lifecycle/category matrix and committed
        # baselines. Any pixel diff above the 0.5% tolerance fails the job.
        # continue-on-error so the constellation suite still runs and both
        # sets of diffs are captured in one CI run.
        continue-on-error: true
        run: bunx vitest run tests/feature-visual-regression.test.ts --reporter=verbose

      - name: Run constellation visual regression
        id: constellation-vr
        # Snapshots /constellation across desktop/tablet/mobile breakpoints.
        # Guards bloom, label collisions, nav/tagline overlap, and bottom
        # chrome stacking when the palette or star renderer is tuned.
        continue-on-error: true
        run: bunx vitest run tests/constellation-visual-regression.test.ts --reporter=verbose

      - name: Run layout visual regression
        id: layout-vr
        # Snapshots Hero, FeatureCard, TimelineView, and Quiz across
        # mobile / tablet / desktop / ultrawide. Element-scoped clips so an
        # unrelated change elsewhere on the page never flags these surfaces.
        continue-on-error: true
        run: bunx vitest run tests/layout-visual-regression.test.ts --reporter=verbose

      - name: Collect diff bundle
        # Runs whenever any suite failed. Copies matched triples
        # (baseline + actual + diff) into a staging dir so reviewers can
        # eyeball changes without checking out the branch or rerunning.
        if: steps.feature-vr.outcome == 'failure' || steps.constellation-vr.outcome == 'failure' || steps.layout-vr.outcome == 'failure'
        run: |
          set -e
          STAGE="_vr_artifacts"
          mkdir -p "$STAGE"
          shopt -s nullglob
          for actual in tests/__screenshots__/*-actual.png; do
            base="${actual%-actual.png}"
            name="$(basename "$base")"
            cp "$actual"                "$STAGE/${name}__actual.png"
            [ -f "${base}-diff.png" ] && cp "${base}-diff.png" "$STAGE/${name}__diff.png"
            [ -f "${base}.png" ]      && cp "${base}.png"      "$STAGE/${name}__baseline.png"
          done
          # Include the HTML diff reports if the suites produced them.
          if [ -d tests/__constellation_report__ ]; then
            mkdir -p "$STAGE/constellation-report"
            cp -R tests/__constellation_report__/. "$STAGE/constellation-report/"
          fi
          if [ -d tests/__layout_report__ ]; then
            mkdir -p "$STAGE/layout-report"
            cp -R tests/__layout_report__/. "$STAGE/layout-report/"
          fi

          {
            echo "# Visual regression diffs"
            echo ""
            echo "Run: ${{ github.run_id }} (${{ github.event_name }} @ ${{ github.sha }})"
            echo ""
            echo "For each failing region you'll find three PNGs:"
            echo "  * \`<region>__baseline.png\` — committed reference"
            echo "  * \`<region>__actual.png\`   — this run"
            echo "  * \`<region>__diff.png\`     — pixelmatch overlay"
            echo ""
            echo "Constellation suite: open \`constellation-report/index.html\` for"
            echo "a side-by-side HTML report of every failing region."
            echo ""
            echo "Layout suite: open \`layout-report/index.html\` for a"
            echo "side-by-side HTML report of Hero/FeatureCard/TimelineView/Quiz diffs."
          } > "$STAGE/README.md"
          ls -la "$STAGE"

      - name: Upload diff artifacts
        if: steps.feature-vr.outcome == 'failure' || steps.constellation-vr.outcome == 'failure' || steps.layout-vr.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          # Unique per run so historical failures aren't overwritten.
          name: visual-regression-diffs-${{ github.run_id }}-${{ github.run_attempt }}
          path: _vr_artifacts/**
          if-no-files-found: warn
          retention-days: 30


      - name: Fail job if any suite failed
        if: steps.feature-vr.outcome == 'failure' || steps.constellation-vr.outcome == 'failure' || steps.layout-vr.outcome == 'failure'
        run: |
          echo "feature-vr:       ${{ steps.feature-vr.outcome }}"
          echo "constellation-vr: ${{ steps.constellation-vr.outcome }}"
          echo "layout-vr:        ${{ steps.layout-vr.outcome }}"
          echo "Diffs uploaded as visual-regression-diffs-${{ github.run_id }}-${{ github.run_attempt }}"
          exit 1


