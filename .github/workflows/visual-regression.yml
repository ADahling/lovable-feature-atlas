name: Visual Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  feature-visual-regression:
    name: Local visual and layout QA
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Test the checked-out commit. Production publication is verified as a
      # separate post-deploy check, not by mixing tests with an older live build.
      SITE_ORIGIN: http://127.0.0.1:8080
      # Keep CI independent of current Supabase rows and scrape timing.
      ATLAS_FORCE_BUNDLED_FEATURES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify TypeScript
        run: bun run typecheck

      - name: Run security contracts
        run: bunx vitest run tests/digest-security-contract.test.ts tests/seo-audit-security-contract.test.ts --reporter=verbose

      - name: Install Playwright Chromium
        run: node node_modules/playwright-core/cli.js install --with-deps chromium

      - name: Verify production build compiles
        run: bun run build

      - name: Start production worker locally
        run: |
          node node_modules/wrangler/bin/wrangler.js dev \
            --config .output/server/wrangler.json \
            --ip 127.0.0.1 \
            --port 8080 \
            --var ATLAS_FORCE_BUNDLED_FEATURES:true \
            --var ATLAS_EDGE_HTML_CACHE:true \
            > /tmp/atlas-worker.log 2>&1 &
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/atlas-worker.log
          exit 1

      - name: Run feature visual regression
        id: feature-vr
        # Representative detail pages must render real content without
        # horizontal overflow or restoring removed UI.
        continue-on-error: true
        run: bunx vitest run tests/feature-visual-regression.test.ts --reporter=verbose

      - name: Run homepage loading contract
        id: homepage-loading
        # Keep the large interactive hero constellation outside the critical
        # hydration path and prevent the duplicate preview close control.
        continue-on-error: true
        run: bunx vitest run tests/hero-constellation-loading.test.ts --reporter=verbose

      - name: Run constellation visual regression
        id: constellation-vr
        # Native SVG map, full catalog, and controls must render safely across
        # desktop/tablet/mobile without clipping or overlap.
        continue-on-error: true
        run: bunx vitest run tests/constellation-visual-regression.test.ts --reporter=verbose

      - name: Run layout visual regression
        id: layout-vr
        # Hero, FeatureCard, TimelineView, and Quiz must have usable geometry
        # with no page overflow at all four supported breakpoints.
        continue-on-error: true
        run: bunx vitest run tests/layout-visual-regression.test.ts --reporter=verbose

      - name: Fail job if any suite failed
        if: steps.feature-vr.outcome == 'failure' || steps.homepage-loading.outcome == 'failure' || steps.constellation-vr.outcome == 'failure' || steps.layout-vr.outcome == 'failure'
        run: |
          echo "feature-vr:       ${{ steps.feature-vr.outcome }}"
          echo "homepage-loading: ${{ steps.homepage-loading.outcome }}"
          echo "constellation-vr: ${{ steps.constellation-vr.outcome }}"
          echo "layout-vr:        ${{ steps.layout-vr.outcome }}"
          echo "See the failed assertion above for the exact route, breakpoint, and geometry issue."
          exit 1
