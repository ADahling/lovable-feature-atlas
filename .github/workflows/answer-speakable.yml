name: Answer / Speakable JSON-LD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: answer-speakable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  answer-speakable-match:
    name: /features/$slug #answer ↔ speakable (all 322)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Crawl the live published site so PRs catch structured-data drift
      # before merge, and force the full dataset (not the stride sample).
      SITE_ORIGIN: https://atlas.dahlingdigital.com
      FEATURE_SAMPLE: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run answer ↔ speakable match test (all features)
        run: bunx vitest run tests/feature-answer-matches-speakable.test.ts --reporter=verbose
