name: OG image integrity

on:
  pull_request:
    paths:
      - "public/og-image.png"
      - "public/og/**"
      - "tests/__og_baselines__/**"
      - "tests/og-image-integrity.test.ts"
      - ".github/workflows/og-image-integrity.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  og-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bunx vitest run tests/og-image-integrity.test.ts
