name: Features vs. changelog audit

on:
  pull_request:
    paths:
      - "src/data/features.ts"
      - "scripts/audit-features-vs-changelog.ts"
      - ".github/workflows/features-audit.yml"
  push:
    branches: [main]
  schedule:
    # Weekly sanity check against the live changelog (Mondays 13:00 UTC).
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - name: Diff features.ts against docs.lovable.dev/changelog
        run: bun run scripts/audit-features-vs-changelog.ts
